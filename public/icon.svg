<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skill Puzzles">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- A Zip-style continuous path threading four checkpoints -->
  <polyline points="146,150 146,362 256,362 256,150 366,150 366,362"
    fill="none" stroke="#ffffff" stroke-width="30"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <circle cx="146" cy="150" r="34" fill="#ffffff"/>
  <circle cx="256" cy="150" r="34" fill="#ffffff"/>
  <circle cx="256" cy="362" r="34" fill="#ffffff"/>
  <circle cx="366" cy="362" r="34" fill="#ffffff"/>
  <text x="146" y="150" dy="11" text-anchor="middle" font-family="ui-monospace, monospace" font-size="40" font-weight="700" fill="#4338ca">1</text>
  <text x="256" y="150" dy="11" text-anchor="middle" font-family="ui-monospace, monospace" font-size="40" font-weight="700" fill="#4338ca">2</text>
  <text x="256" y="362" dy="11" text-anchor="middle" font-family="ui-monospace, monospace" font-size="40" font-weight="700" fill="#4338ca">3</text>
  <text x="366" y="362" dy="11" text-anchor="middle" font-family="ui-monospace, monospace" font-size="40" font-weight="700" fill="#0e7490">4</text>
</svg>
